services:
  cleanup:
    build:
      context: ../..
      dockerfile: apps/clean_up/Dockerfile
    image: didcomm-mediator-cleanup:local
    environment:
      WALLET_URI: ${WALLET_URI}
      PICKUP_REPOSITORY_URL: ${PICKUP_REPOSITORY_URL}
      WALLET_NAME: ${WALLET_NAME}
      WALLET_KEY: ${WALLET_KEY}
      WALLET_KEY_DERIVATION_METHOD: ${WALLET_KEY_DERIVATION_METHOD:-ARGON2I_MOD}
      INACTIVE_DAYS_THRESHOLD: ${INACTIVE_DAYS_THRESHOLD:-365}